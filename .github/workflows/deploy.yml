      #     mvn -s .mvn/settings.xml install:install-file -Dfile=lib/common-report-1.0.0.jar -DgroupId=com.common -DartifactId=common-report -Dversion=1.0.0 -Dpackaging=jar -DgeneratePom=true
      #     mvn -s .mvn/settings.xml install:install-file -Dfile=lib/common-logging-1.0.0.jar -DgroupId=com.common -DartifactId=common-logging -Dversion=1.0.0 -Dpackaging=jar -DgeneratePom=true
      #     mvn -s .mvn/settings.xml install:install-file -Dfile=lib/common-file-1.0.0.jar -DgroupId=com.common -DartifactId=common-file -Dversion=1.0.0 -Dpackaging=jar -DgeneratePom=true
      #     mvn -s .mvn/settings.xml install:install-file -Dfile=lib/common-db-1.0.0.jar -DgroupId=com.common -DartifactId=common-db -Dversion=1.0.0 -Dpackaging=jar -DgeneratePom=true
      #     mvn -s .mvn/settings.xml install:install-file -Dfile=lib/common-auth-1.0.0.jar -DgroupId=com.common -DartifactId=common-auth -Dversion=1.0.0 -Dpackaging=jar -DgeneratePom=true
      #     mvn -s .mvn/settings.xml install:install-file -Dfile=lib/common-mail-1.0.0.jar -DgroupId=com.common -DartifactId=common-mail -Dversion=1.0.0 -Dpackaging=jar -DgeneratePom=true

      # - name: Mavenでビルド（リトライ付き）
