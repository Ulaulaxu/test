---
name: Build and Deploy to SAP BTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # push時にも必ず動くよう、needs依存を外す
    if: ${{ always() }}
    env:
      BTP_API: 'https://api.cf.ap10.hana.ondemand.com'
      BTP_ORG: 'Product Support - SAP CP Sandbox_ula-cf-csxoz6mp'
      BTP_SPACE: 'dev'
      BTP_APP_NAME: ${{ secrets.BTP_APP_NAME }}
      # JWT認証用: SAP Cloud Identity Services テナント Issuer URI
      BTP_TENANT_ISSUER_URI: "https://support.accounts.ondemand.com"
      # JWT認証用: カスタムプラットフォーム IdP の origin 識別子
      BTP_USER_ORIGIN: "support-platform"
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      # - name: Javaのセットアップ
      #   uses: actions/setup-java@v4
